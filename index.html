<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkinFlow — Clinical Concern Index</title>
    
    <!-- PWA / Standalone App Support -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0D0D0D">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22SkinFlow%22,%22short_name%22:%22SkinFlow%22,%22start_url%22:%22index.html%22,%22display%22:%22standalone%22,%22background_color%22:%22%230D0D0D%22,%22theme_color%22:%22%23C9956A%22}">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0D0D0D;
            --surface: #161616;
            --elevated: #1E1E1E;
            --accent: #C9956A;
            --text-primary: #F0EDE8;
            --text-secondary: #8A8480;
            --text-muted: #4A4744;
            --border: #2A2724;
            --radius-lg: 24px;
            --radius-md: 16px;
            --font-ui: 'Inter', sans-serif;
            --font-heading: 'DM Serif Display', serif;
            --transition: 300ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: var(--font-ui);
            line-height: 1.5;
            height: 100dvh;
            overflow: hidden;
        }

        /* --- FIXED GREEN PART (HEADER) --- */
        .fixed-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: var(--bg);
            z-index: 1000;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
        }

        header { padding: 16px 0 10px; display: flex; justify-content: space-between; align-items: center; }
        .wordmark { font-size: 14px; font-weight: 600; letter-spacing: 0.05em; color: var(--text-muted); text-transform: uppercase; }
        .settings-trigger { background: none; border: none; cursor: pointer; color: var(--text-muted); }

        .search-area { padding-bottom: 10px; }
        .search-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            padding: 12px 0;
            font-size: 22px;
            font-family: var(--font-ui);
            color: var(--text-primary);
            outline: none;
        }
        .search-input:focus { border-color: var(--accent); }

        .category-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 12px 0 16px;
            scrollbar-width: none;
        }
        .category-scroll::-webkit-scrollbar { display: none; }
        .cat-pill {
            flex: 0 0 auto;
            padding: 8px 18px;
            border-radius: 999px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        .cat-pill.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

        /* --- SCROLLABLE RED PART (REELS FEED) --- */
        .concern-grid {
            margin-top: 175px; 
            height: calc(100dvh - 175px);
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .concern-grid::-webkit-scrollbar { display: none; }

        .concern-card {
            height: 100%;
            width: 100%;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid var(--border);
            padding: 20px;
            animation: fadeIn 400ms ease;
        }

        .card-header { padding-bottom: 15px; }
        .concern-card h3 { 
            font-family: var(--font-heading); 
            font-size: 24px; 
            color: var(--text-primary); 
            line-height: 1.1;
        }

        .card-carousel {
            flex-grow: 1;
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            width: 100%;
            border-radius: var(--radius-lg);
            background: #000;
            border: 1px solid var(--border);
        }
        .card-carousel::-webkit-scrollbar { display: none; }
        
        .carousel-item {
            flex: 0 0 100%;
            height: 100%;
            scroll-snap-align: start;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1A1A1A 0%, #222 100%);
            position: relative;
        }
        .carousel-item::after { content: 'Reference View'; font-size: 10px; text-transform: uppercase; color: var(--text-muted); opacity: 0.4; }

        .card-footer { padding: 15px 0 10px; display: flex; justify-content: space-between; align-items: center; }
        .cat-tag { font-size: 11px; text-transform: uppercase; font-weight: 700; padding: 4px 12px; border-radius: 999px; }
        .arrow-hint { color: var(--text-muted); font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 4px; }

        /* --- TRANSFORMATION GALLERY OVERLAY (INSTA STYLE) --- */
        #detail-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000; overflow-y: auto;
            display: none; transform: translateX(100%); transition: transform var(--transition);
        }
        #detail-overlay.active { display: block; transform: translateX(0); }
        
        .overlay-header { 
            padding: 20px; 
            position: sticky; 
            top: 0; 
            background: var(--bg); 
            z-index: 100; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            border-bottom: 1px solid var(--border); 
        }
        .back-btn { background: none; border: none; cursor: pointer; color: var(--text-primary); font-size: 24px; display: flex; align-items: center; }
        .overlay-title { font-family: var(--font-heading); font-size: 20px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .gallery-feed { padding: 0 0 100px; }
        
        /* Clinic Card (Insta Post Style) */
        .clinic-post { margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .clinic-post-header { padding: 15px 20px; display: flex; align-items: center; gap: 10px; }
        .clinic-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; color: var(--bg); font-weight: 800; font-size: 12px; }
        .clinic-post-name { font-size: 14px; font-weight: 700; color: var(--text-primary); }
        
        /* BA Rectangular Swiper */
        .ba-swiper {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            gap: 0;
            width: 100%;
        }
        .ba-swiper::-webkit-scrollbar { display: none; }
        .ba-item {
            flex: 0 0 100%;
            aspect-ratio: 3 / 2; /* Combined Landscape Rectangle */
            scroll-snap-align: start;
            display: flex;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }
        .ba-half {
            width: 50%; /* Each half becomes a 3:4 portrait rectangle */
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .ba-half.before { background: #111; border-right: 1px solid rgba(201, 149, 106, 0.3); }
        .ba-half.after { background: #181818; }
        .ba-label { position: absolute; bottom: 12px; font-size: 10px; font-weight: 800; letter-spacing: 0.1em; color: var(--text-muted); text-transform: uppercase; background: rgba(0,0,0,0.5); padding: 2px 8px; border-radius: 4px; }

        /* Carousel Paging Dots (Insta style) */
        .swiper-dots { display: flex; justify-content: center; gap: 5px; padding: 10px 0; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); transition: 0.3s; }
        .dot.active { background: var(--accent); }

        .view-protocol-btn {
            position: fixed;
            bottom: 24px;
            left: 20px;
            right: 20px;
            background: var(--accent);
            color: var(--bg);
            height: 54px;
            border-radius: 14px;
            border: none;
            font-weight: 700;
            font-size: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            z-index: 150;
        }

        /* Medical View */
        .protocol-view { padding: 20px; animation: fadeIn 0.4s ease; }
        .protocol-title { font-family: var(--font-heading); font-size: 38px; margin-bottom: 24px; line-height: 1; }
        .protocol-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; margin-bottom: 12px; overflow: hidden; }
        .panel-header { padding: 24px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .panel-header h4 { font-size: 16px; font-weight: 600; text-transform: uppercase; color: var(--accent); }
        .panel-body { display: none; padding: 0 24px 24px; }
        .panel-body.open { display: block; }
        .protocol-item { border-top: 1px solid var(--border); padding: 16px 0; }
        .item-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; display: block; }
        .item-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.4; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="fixed-header">
    <header>
        <span class="wordmark">SkinFlow</span>
        <button class="settings-trigger" onclick="toggleSettings()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
    </header>
    <div class="search-area">
        <input type="text" id="searchInput" class="search-input" placeholder="what's your concern?" autocomplete="off">
    </div>
    <div class="category-scroll" id="catScroll"></div>
</div>

<!-- Vertically Scrollable Reels Feed -->
<div class="concern-grid" id="concernGrid"></div>

<!-- Overlay for Gallery & Protocol -->
<div id="detail-overlay">
    <div class="overlay-header">
        <button class="back-btn" onclick="closeDetail()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <span class="overlay-title" id="overlayTitle">Gallery</span>
    </div>
    <div id="detailContent"></div>
</div>

<div class="sheet-overlay" onclick="toggleSettings()"></div>
<div id="settings-sheet">
    <a href="#" class="sheet-link">About SkinFlow</a>
    <a href="#" class="sheet-link">Medical Disclaimer</a>
    <a href="#" class="sheet-link">Privacy Policy</a>
</div>

<script>
    // --- MASTER CLINICAL DATABASE ---
    const RAW_DATA = [
      {
        cat: "Texture & Scarring",
        concerns: [
          { name: "Acne scars (atrophic / ice pick / boxcar / rolling)", med: ["CO2 fractional laser", "Erbium laser resurfacing", "Microneedling RF (Morpheus8)", "Subcision", "TCA cross", "Dermal fillers", "PRP", "CROSS"], ing: ["Retinoids (tretinoin)", "Bakuchiol", "Vitamin C 20%", "Niacinamide", "AHA (glycolic)", "Peptides", "Centella asiatica"], diet: ["Collagen supplements", "Vitamin C foods", "Zinc foods", "Omega-3s", "Bone broth", "Avoid high-GI"] },
          { name: "Hypertrophic scars & keloids", med: ["Steroid injections", "Pulsed dye laser (PDL)", "Cryotherapy", "Surgical excision", "Silicone sheets", "5-FU injections"], ing: ["Silicone serums", "Onion extract", "Centella asiatica", "Vitamin E oil"], diet: ["Anti-inflammatory diet", "Vitamin C", "Reduce sugar", "Protein intake"] },
          { name: "Rough / uneven skin texture", med: ["Microdermabrasion", "Chemical peels", "Dermaplaning", "Fractional laser", "HydraFacial"], ing: ["AHA (glycolic)", "BHA (salicylic)", "PHA", "Retinoids", "Urea 10%", "Niacinamide"], diet: ["Hydration 3L", "Vitamin A foods", "Biotin", "Collagen foods"] },
          { name: "Enlarged pores", med: ["Fractional laser", "Microneedling", "Salicylic peels", "Micro-botox"], ing: ["Salicylic acid 2%", "Niacinamide 10%", "Retinoids", "Clay", "Azelaic acid", "Zinc"], diet: ["Low-dairy", "Low-GI foods", "Zinc supplement", "Antioxidants"] }
        ]
      },
      {
        cat: "Pigmentation",
        concerns: [
          { name: "Melasma", med: ["Jessner Peels", "IPL", "Oral Tranexamic Acid", "Picosecond laser", "Mesotherapy"], ing: ["Hydroquinone 4%", "Tranexamic acid 5%", "Kojic acid", "Azelaic acid 20%", "Alpha arbutin", "Vitamin C", "SPF 50+"], diet: ["Anti-inflammatory", "Avoid phytoestrogens", "Polyphenols", "Vitamin D", "Limit alcohol"] },
          { name: "Post-inflammatory hyperpigmentation (PIH)", med: ["Chemical peels", "Microneedling", "Low-fluence laser", "LED light therapy"], ing: ["Niacinamide 10%", "Alpha arbutin 2%", "Kojic acid", "Tranexamic acid", "Vitamin C", "Azelaic acid", "SPF 50+"], diet: ["Omega-3s", "Vitamin C foods", "Zinc", "Avoid trigger foods"] },
          { name: "Sunspots / Solar lentigines", med: ["Nd:YAG laser", "IPL", "Cryotherapy", "Chemical peels"], ing: ["Hydroquinone", "Alpha arbutin", "Vitamin C", "Retinoids", "AHA", "SPF 50+"], diet: ["Antioxidant diet", "Vitamin E", "Green tea", "Tomatoes"] }
        ]
      },
      {
        cat: "Acne & Breakouts",
        concerns: [
          { name: "Inflammatory acne (papules & pustules)", med: ["Blue light / PDT", "Salicylic peels", "Steroid shots", "Antibiotics", "Hormonal therapy"], ing: ["Benzoyl peroxide", "Salicylic acid", "Niacinamide", "Tea tree oil", "Adapalene", "Azelaic acid"], diet: ["Low-GI", "Reduce dairy", "Probiotics", "Spearmint tea", "Zinc"] }
        ]
      }
      // ... Remaining concerns handled via same logic
    ];

    const DATA = RAW_DATA.flatMap(catGroup => 
        catGroup.concerns.map(c => ({
            name: c.name,
            cat: catGroup.cat,
            med: c.med.map(m => ({ name: m, desc: "Professional clinical intervention targeting cellular repair." })),
            ing: c.ing.map(i => ({ name: i, desc: "Topical active ingredient for structural support." })),
            diet: c.diet.map(d => ({ name: d, desc: "Internal protocol to optimize health." }))
        }))
    );

    const CAT_COLORS = { "Texture & Scarring": "#7C6AF5", "Pigmentation": "#E8A838", "Acne & Breakouts": "#E85D5D" };
    let activeCat = "All";
    const grid = document.getElementById('concernGrid');
    const searchInput = document.getElementById('searchInput');
    const catScroll = document.getElementById('catScroll');

    function init() { renderCategories(); renderConcerns(); searchInput.focus(); }

    function renderCategories() {
        const cats = ["All", ...Object.keys(CAT_COLORS).filter(c => RAW_DATA.some(g => g.cat === c))];
        catScroll.innerHTML = cats.map(c => `<button class="cat-pill ${c === activeCat ? 'active' : ''}" onclick="filterByCat('${c}')">${c}</button>`).join('');
    }

    function filterByCat(c) {
        activeCat = c; renderCategories(); renderConcerns(); grid.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderConcerns() {
        const query = searchInput.value.toLowerCase();
        const filtered = DATA.filter(item => (activeCat === "All" || item.cat === activeCat) && item.name.toLowerCase().includes(query));

        if (filtered.length === 0) {
            grid.innerHTML = `<div style="height:100%; display:flex; align-items:center; justify-content:center; color:var(--text-muted);">No results found.</div>`;
            return;
        }

        grid.innerHTML = filtered.map(item => `
            <div class="concern-card" onclick="openGallery('${item.name.replace(/'/g, "\\'")}')">
                <div class="card-header"><h3>${item.name}</h3></div>
                <div class="card-carousel" onclick="event.stopPropagation()">
                    <div class="carousel-item"></div>
                </div>
                <div class="card-footer">
                    <span class="cat-tag" style="background: ${CAT_COLORS[item.cat] || '#222'}20; color: ${CAT_COLORS[item.cat] || '#888'}">${item.cat}</span>
                    <div class="arrow-hint">Explore Results →</div>
                </div>
            </div>
        `).join('');
    }

    searchInput.addEventListener('input', renderConcerns);

    function openGallery(name) {
        const item = DATA.find(d => d.name === name);
        const overlay = document.getElementById('detail-overlay');
        const content = document.getElementById('detailContent');
        document.getElementById('overlayTitle').textContent = item.name;
        
        content.innerHTML = `
            <div class="gallery-feed">
                ${['Test Clinic A', 'Test Clinic B'].map(clinic => `
                    <div class="clinic-post">
                        <div class="clinic-post-header">
                            <div class="clinic-avatar">${clinic.split(' ').pop()}</div>
                            <span class="clinic-post-name">${clinic}</span>
                        </div>
                        <div class="ba-swiper">
                            ${[1, 2, 3].map(() => `
                                <div class="ba-item">
                                    <div class="ba-half before"><span class="ba-label">Before</span></div>
                                    <div class="ba-half after"><span class="ba-label">After</span></div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="swiper-dots"><div class="dot active"></div><div class="dot"></div><div class="dot"></div></div>
                    </div>
                `).join('')}
                <button class="view-protocol-btn" onclick="openProtocol('${item.name.replace(/'/g, "\\'")}')">View Clinical Protocol →</button>
            </div>
        `;
        
        overlay.style.display = 'block';
        setTimeout(() => overlay.classList.add('active'), 10);
    }

    function openProtocol(name) {
        const item = DATA.find(d => d.name === name);
        const content = document.getElementById('detailContent');
        
        content.innerHTML = `
            <div class="protocol-view">
                <h1 class="protocol-title">${item.name}</h1>
                <div class="protocol-panel"><div class="panel-header" onclick="togglePanel(this)"><h4>Medical Treatments</h4><span>${item.med.length}</span></div>
                    <div class="panel-body">${item.med.map(m => `<div class="protocol-item"><span class="item-name">${m.name}</span><p class="item-desc">${m.desc}</p></div>`).join('')}</div>
                </div>
                <div class="protocol-panel"><div class="panel-header" onclick="togglePanel(this)"><h4>Skincare Ingredients</h4><span>${item.ing.length}</span></div>
                    <div class="panel-body">${item.ing.map(i => `<div class="protocol-item"><span class="item-name">${i.name}</span><p class="item-desc">${i.desc}</p></div>`).join('')}</div>
                </div>
                <div class="protocol-panel"><div class="panel-header" onclick="togglePanel(this)"><h4>Dietary Protocols</h4><span>${item.diet.length}</span></div>
                    <div class="panel-body">${item.diet.map(d => `<div class="protocol-item"><span class="item-name">${d.name}</span><p class="item-desc">${d.desc}</p></div>`).join('')}</div>
                </div>
            </div>
        `;
        document.getElementById('detail-overlay').scrollTo({ top: 0, behavior: 'smooth' });
    }

    function closeDetail() {
        const overlay = document.getElementById('detail-overlay');
        overlay.classList.remove('active');
        setTimeout(() => overlay.style.display = 'none', 300);
    }

    function togglePanel(header) { header.nextElementSibling.classList.toggle('open'); }
    function toggleSettings() {
        document.getElementById('settings-sheet').classList.toggle('active');
        document.querySelector('.sheet-overlay').classList.toggle('active');
    }

    window.onload = init;
</script>

</body>
</html>
