<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkinFlow — Clinical Concern Index</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0D0D0D;
            --surface: #161616;
            --elevated: #1E1E1E;
            --accent: #C9956A;
            --text-primary: #F0EDE8;
            --text-secondary: #8A8480;
            --text-muted: #4A4744;
            --border: #2A2724;
            --radius-lg: 16px;
            --radius-md: 12px;
            --font-ui: 'Inter', sans-serif;
            --font-heading: 'DM Serif Display', serif;
            --transition: 300ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: var(--font-ui);
            line-height: 1.5;
            overflow-x: hidden;
            overscroll-behavior: none;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* Minimal Header */
        header {
            padding: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .wordmark {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .settings-trigger {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            transition: color var(--transition);
        }

        .settings-trigger:hover { color: var(--text-secondary); }

        /* Search Section */
        .search-area { padding-top: 20px; }
        .search-input-wrapper { position: relative; width: 100%; }
        .search-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--border);
            padding: 16px 0;
            font-size: 28px;
            font-family: var(--font-ui);
            font-weight: 500;
            color: var(--text-primary);
            outline: none;
            transition: border-color var(--transition);
        }
        .search-input:focus { border-color: var(--accent); }
        .search-input::placeholder { color: var(--text-muted); }

        /* Category Pills */
        .category-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 24px 0;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .category-scroll::-webkit-scrollbar { display: none; }
        .cat-pill {
            flex: 0 0 auto;
            padding: 8px 18px;
            border-radius: 999px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
        }
        .cat-pill.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

        /* Grid */
        .concern-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            padding-bottom: 100px;
        }

        .concern-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 180px;
            animation: fadeIn 400ms ease;
        }
        .concern-card:hover { transform: scale(1.02); background: var(--elevated); border-color: var(--text-muted); }
        
        .concern-card h3 { font-family: var(--font-heading); font-size: 24px; color: var(--text-primary); margin-bottom: 12px; line-height: 1.1; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; }
        .cat-tag { font-size: 11px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em; padding: 4px 10px; border-radius: 999px; }
        .arrow { color: var(--text-muted); font-size: 18px; }

        /* Detail View */
        #detail-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 2000;
            overflow-y: auto;
            display: none;
            transform: translateX(100%);
            transition: transform var(--transition);
        }
        #detail-overlay.active { display: block; transform: translateX(0); }

        .detail-nav { padding: 20px; position: sticky; top: 0; background: var(--bg); z-index: 10; }
        .back-btn { background: none; border: none; cursor: pointer; color: var(--text-primary); font-size: 24px; }

        .detail-content { padding: 0 20px 60px; }
        .detail-title { font-family: var(--font-heading); font-size: 42px; margin-bottom: 32px; line-height: 1; }

        .protocol-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            margin-bottom: 12px;
            overflow: hidden;
        }
        .panel-header {
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }
        .panel-header h4 { font-size: 16px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--accent); }
        .panel-count { font-size: 12px; color: var(--text-muted); font-weight: 700; }
        .panel-body { display: none; padding: 0 24px 24px; }
        .panel-body.open { display: block; }

        .protocol-item { border-top: 1px solid var(--border); padding: 16px 0; }
        .protocol-item:first-child { border-top: none; }
        .item-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; display: block; }
        .item-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.4; }

        /* Bottom Sheet */
        #settings-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--surface);
            border-top: 1px solid var(--border);
            border-radius: 24px 24px 0 0;
            z-index: 3000;
            padding: 32px 24px;
            transform: translateY(100%);
            transition: transform var(--transition);
        }
        #settings-sheet.active { transform: translateY(0); }
        .sheet-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2900; display: none; }
        .sheet-overlay.active { display: block; }

        .sheet-link { display: block; padding: 16px 0; font-weight: 600; color: var(--text-secondary); text-decoration: none; border-bottom: 1px solid var(--border); }
        .sheet-link:last-child { border-bottom: none; }

        /* Search Highlight */
        .highlight-reason { font-size: 12px; color: var(--accent); font-weight: 600; margin-top: 8px; font-style: italic; opacity: 0.8; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Desktop Nav Rail */
        @media (min-width: 1024px) {
            .nav-rail { position: fixed; left: 0; top: 0; height: 100%; width: 64px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 24px 0; background: var(--bg); }
            .container { padding-left: 100px; }
            #detail-overlay { left: 64px; width: calc(100% - 64px); }
        }
    </style>
</head>

        {name:"Telangiectasia (broken capillaries)",med:["Pulsed dye laser (PDL)","Nd:YAG laser","IPL","Sclerotherapy (legs)","Electrocautery"],ing:["Vitamin K","Niacinamide","Arnica extract","Centella asiatica","SPF 50+","Avoid temperature extremes"],diet:["Vitamin C + bioflavonoids","Quercetin","Rutin supplement","Reduce alcohol","Omega-3s","Avoid spicy foods"]}

    // --- TRANSFORM RAW DATA INTO APP DATA ---
    const DATA = RAW_DATA.flatMap(catGroup => 
        catGroup.concerns.map(c => ({
            name: c.name,
            cat: catGroup.cat,
            med: c.med.map(m => ({ name: m, desc: "" })),
            ing: c.ing.map(i => ({ name: i, desc: "" })),
            diet: c.diet.map(d => ({ name: d, desc: "" }))
        }))
    );

    const CAT_COLORS = {
        "Texture & Scarring": "#7C6AF5",
        "Pigmentation": "#E8A838",
        "Acne & Breakouts": "#E85D5D",
        "Aging & Laxity": "#5DB8A8",
        "Redness & Sensitivity": "#E87FA0",
        "Dryness & Hydration": "#5B9BD5",
        "Oil & Shine": "#6BBF72",
        "Body & Specialized": "#C9956A",
        "Hair & Scalp": "#A87FC9",
        "Sun & Environmental Damage": "#D4854A",
        "Specific Skin Conditions": "#4A4744"
    };

    let activeCat = "All";
    const grid = document.getElementById('concernGrid');
    const searchInput = document.getElementById('searchInput');
    const catScroll = document.getElementById('catScroll');

    function init() {
        renderCategories();
        renderConcerns();
        searchInput.focus();
    }

    function renderCategories() {
        const cats = ["All", ...Object.keys(CAT_COLORS).filter(c => RAW_DATA.some(g => g.cat === c))];
        catScroll.innerHTML = cats.map(c => `
            <button class="cat-pill ${c === activeCat ? 'active' : ''}" onclick="filterByCat('${c}')">
                ${c}
            </button>
        `).join('');
    }

    function filterByCat(c) {
        activeCat = c;
        renderCategories();
        renderConcerns();
    }

    function renderConcerns() {
        const query = searchInput.value.toLowerCase();
        const filtered = DATA.filter(item => {
            const matchesCat = activeCat === "All" || item.cat === activeCat;
            const matchesName = item.name.toLowerCase().includes(query);
            const matchesMeta = item.med.some(m => m.name.toLowerCase().includes(query)) || 
                               item.ing.some(i => i.name.toLowerCase().includes(query)) ||
                               item.diet.some(d => d.name.toLowerCase().includes(query));
            return matchesCat && (matchesName || matchesMeta);
        });

        if (filtered.length === 0) {
            grid.innerHTML = `<div style="grid-column: 1/-1; padding: 100px 0; text-align: center; color: var(--text-muted);">
                <p style="font-size: 20px; margin-bottom: 20px;">no concerns match — try a different term</p>
                <button onclick="clearSearch()" class="cat-pill active">Clear Search</button>
            </div>`;
            return;
        }

        grid.innerHTML = filtered.map(item => {
            const query = searchInput.value.toLowerCase();
            const matchedIng = query.length > 2 && item.ing.find(i => i.name.toLowerCase().includes(query));
            const matchedMed = query.length > 2 && item.med.find(m => m.name.toLowerCase().includes(query));
            const matchedDiet = query.length > 2 && item.diet.find(d => d.name.toLowerCase().includes(query));
            
            return `
            <div class="concern-card" onclick="openDetail('${item.name.replace(/'/g, "\\'")}')">
                <div>
                    <h3>${item.name}</h3>
                    ${matchedIng || matchedMed || matchedDiet ? `<div class="highlight-reason">Matches: ${matchedIng?.name || matchedMed?.name || matchedDiet?.name}</div>` : ''}
                </div>
                <div class="card-footer">
                    <span class="cat-tag" style="background: ${CAT_COLORS[item.cat]}20; color: ${CAT_COLORS[item.cat]}">
                        ${item.cat}
                    </span>
                    <span class="arrow">→</span>
                </div>
            </div>
            `;
        }).join('');
    }

    function clearSearch() {
        searchInput.value = '';
        renderConcerns();
    }

    searchInput.addEventListener('input', renderConcerns);

    function openDetail(name) {
        const item = DATA.find(d => d.name === name);
        const overlay = document.getElementById('detail-overlay');
        const content = document.getElementById('detailContent');
        
        content.innerHTML = `
            <h1 class="detail-title">${item.name}</h1>
            
            <div class="protocol-panel">
                <div class="panel-header" onclick="togglePanel(this)">
                    <h4>Medical Treatments</h4>
                    <span class="panel-count">${item.med.length} items</span>
                </div>
                <div class="panel-body">
                    ${item.med.map(m => `
                        <div class="protocol-item">
                            <span class="item-name">${m.name}</span>
                            ${m.desc ? `<p class="item-desc">${m.desc}</p>` : ''}
                        </div>
                    `).join('')}
                </div>
            </div>

            <div class="protocol-panel">
                <div class="panel-header" onclick="togglePanel(this)">
                    <h4>Skincare Ingredients</h4>
                    <span class="panel-count">${item.ing.length} items</span>
                </div>
                <div class="panel-body">
                    ${item.ing.map(i => `
                        <div class="protocol-item">
                            <span class="item-name">${i.name}</span>
                            ${i.desc ? `<p class="item-desc">${i.desc}</p>` : ''}
                        </div>
                    `).join('')}
                </div>
            </div>

            <div class="protocol-panel">
                <div class="panel-header" onclick="togglePanel(this)">
                    <h4>Dietary Protocols</h4>
                    <span class="panel-count">${item.diet.length} items</span>
                </div>
                <div class="panel-body">
                    ${item.diet.map(d => `
                        <div class="protocol-item">
                            <span class="item-name">${d.name}</span>
                            ${d.desc ? `<p class="item-desc">${d.desc}</p>` : ''}
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
        
        overlay.style.display = 'block';
        setTimeout(() => overlay.classList.add('active'), 10);
        document.body.style.overflow = 'hidden';
    }

    function closeDetail() {
        const overlay = document.getElementById('detail-overlay');
        overlay.classList.remove('active');
        setTimeout(() => {
            overlay.style.display = 'none';
            document.body.style.overflow = 'auto';
        }, 300);
    }

    function togglePanel(header) {
        const body = header.nextElementSibling;
        body.classList.toggle('open');
    }

    function toggleSettings() {
        const sheet = document.getElementById('settings-sheet');
        const overlay = document.querySelector('.sheet-overlay');
        sheet.classList.toggle('active');
        overlay.classList.toggle('active');
    }

    init();
</script>
