<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>SkinFlow — Clinical Concern Index</title>
    
    <!-- PWA / Standalone App Support -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0D0D0D">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22SkinFlow%22,%22short_name%22:%22SkinFlow%22,%22start_url%22:%22index.html%22,%22display%22:%22standalone%22,%22background_color%22:%22%230D0D0D%22,%22theme_color%22:%22%23C9956A%22}">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0D0D0D;
            --surface: #161616;
            --elevated: #1E1E1E;
            --accent: #C9956A;
            --text-primary: #F0EDE8;
            --text-secondary: #8A8480;
            --text-muted: #4A4744;
            --border: #2A2724;
            --radius-lg: 24px;
            --radius-md: 12px;
            --font-ui: 'Inter', sans-serif;
            --font-heading: 'DM Serif Display', serif;
            --transition: 300ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: var(--font-ui);
            line-height: 1.5;
            height: 100dvh;
            overflow: hidden;
        }

        /* Fixed Green Part (Header & Filters) */
        .fixed-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: var(--bg);
            z-index: 1000;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
        }

        header { padding: 16px 0 10px; display: flex; justify-content: space-between; align-items: center; }
        .wordmark { font-size: 14px; font-weight: 600; letter-spacing: 0.05em; color: var(--text-muted); text-transform: uppercase; }
        .settings-trigger { background: none; border: none; cursor: pointer; color: var(--text-muted); }

        .search-area { padding-bottom: 10px; }
        .search-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            padding: 12px 0;
            font-size: 22px;
            font-family: var(--font-ui);
            color: var(--text-primary);
            outline: none;
        }
        .search-input:focus { border-color: var(--accent); }

        .category-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 12px 0 16px;
            scrollbar-width: none;
        }
        .category-scroll::-webkit-scrollbar { display: none; }
        .cat-pill {
            flex: 0 0 auto;
            padding: 8px 18px;
            border-radius: 999px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        .cat-pill.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

        /* Scrollable Red Part (Reels Feed) */
        .concern-grid {
            margin-top: 175px; 
            height: calc(100dvh - 175px);
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .concern-grid::-webkit-scrollbar { display: none; }

        .concern-card {
            height: 100%;
            width: 100%;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid var(--border);
            padding: 20px;
            animation: fadeIn 400ms ease;
        }

        .card-header { padding-bottom: 15px; }
        .concern-card h3 { 
            font-family: var(--font-heading); 
            font-size: 24px; 
            color: var(--text-primary); 
            line-height: 1.1;
        }

        /* Instagram Carousel Area */
        .card-carousel {
            flex-grow: 1;
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            width: 100%;
            border-radius: var(--radius-lg);
            background: #000;
            border: 1px solid var(--border);
        }
        .card-carousel::-webkit-scrollbar { display: none; }
        
        .carousel-item {
            flex: 0 0 100%;
            height: 100%;
            scroll-snap-align: start;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1A1A1A 0%, #222 100%);
            position: relative;
        }
        .carousel-item::after {
            content: 'Clinical View';
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            opacity: 0.4;
        }

        .card-footer { 
            padding: 15px 0 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .cat-tag { font-size: 11px; text-transform: uppercase; font-weight: 700; padding: 4px 12px; border-radius: 999px; }
        .arrow-hint { color: var(--text-muted); font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 4px; }

        /* Detail Overlay */
        #detail-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000; overflow-y: auto;
            display: none; transform: translateX(100%); transition: transform var(--transition);
        }
        #detail-overlay.active { display: block; transform: translateX(0); }
        .detail-nav { padding: 20px; position: sticky; top: 0; background: var(--bg); z-index: 10; }
        .back-btn { background: none; border: none; cursor: pointer; color: var(--text-primary); font-size: 24px; }
        .detail-content { padding: 0 20px 60px; }
        .detail-title { font-family: var(--font-heading); font-size: 42px; margin-bottom: 32px; line-height: 1; }

        .protocol-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .panel-header { padding: 24px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .panel-header h4 { font-size: 16px; font-weight: 600; text-transform: uppercase; color: var(--accent); }
        .panel-count { font-size: 12px; color: var(--text-muted); font-weight: 700; }
        .panel-body { display: none; padding: 0 24px 24px; }
        .panel-body.open { display: block; }
        .protocol-item { border-top: 1px solid var(--border); padding: 16px 0; }
        .item-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; display: block; }
        .item-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.4; }

        /* Sheet UI */
        #settings-sheet { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--surface); border-top: 1px solid var(--border); border-radius: 24px 24px 0 0; z-index: 3000; padding: 32px 24px; transform: translateY(100%); transition: transform var(--transition); }
        #settings-sheet.active { transform: translateY(0); }
        .sheet-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2900; display: none; }
        .sheet-overlay.active { display: block; }
        .sheet-link { display: block; padding: 16px 0; font-weight: 600; color: var(--text-secondary); text-decoration: none; border-bottom: 1px solid var(--border); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

        concerns: [
          { name: "Sun damage / photoaging", med: ["IPL", "Fractional CO2 laser", "Chemical peels", "PDT", "Microneedling"], ing: ["Mineral SPF 50+", "Vitamin C", "Niacinamide", "Retinoids", "Resveratrol"], diet: ["Lycopene", "Astaxanthin", "Green tea", "Omega-3"] },
          { name: "Telangiectasia (broken capillaries)", med: ["PDL Laser", "Nd:YAG laser", "IPL", "Sclerotherapy", "Electrocautery"], ing: ["Vitamin K", "Niacinamide", "Arnica", "Centella asiatica", "SPF 50+"], diet: ["Vitamin C + bioflavonoids", "Quercetin", "Rutin", "Omega-3"] }
        ]
      }
    ];

    const DATA = RAW_DATA.flatMap(catGroup => 
        catGroup.concerns.map(c => ({
            name: c.name,
            cat: catGroup.cat,
            med: c.med.map(m => ({ name: m, desc: "Professional clinical intervention targeting cellular repair." })),
            ing: c.ing.map(i => ({ name: i, desc: "Topical active ingredient for structural skin support." })),
            diet: c.diet.map(d => ({ name: d, desc: "Internal nutritional protocol to optimize skin health." }))
        }))
    );

    const CAT_COLORS = {
        "Texture & Scarring": "#7C6AF5",
        "Pigmentation": "#E8A838",
        "Acne & Breakouts": "#E85D5D",
        "Aging & Laxity": "#5DB8A8",
        "Redness & Sensitivity": "#E87FA0",
        "Dryness & Hydration": "#5B9BD5",
        "Body & Specialized": "#C9956A",
        "Hair & Scalp": "#A87FC9",
        "Sun & Environmental Damage": "#D4854A"
    };

    let activeCat = "All";
    const grid = document.getElementById('concernGrid');
    const searchInput = document.getElementById('searchInput');
    const catScroll = document.getElementById('catScroll');

    function init() {
        renderCategories();
        renderConcerns();
        searchInput.focus();
    }

    function renderCategories() {
        const cats = ["All", ...Object.keys(CAT_COLORS).filter(c => RAW_DATA.some(g => g.cat === c))];
        catScroll.innerHTML = cats.map(c => `
            <button class="cat-pill ${c === activeCat ? 'active' : ''}" onclick="filterByCat('${c}')">
                ${c}
            </button>
        `).join('');
    }

    function filterByCat(c) {
        activeCat = c;
        renderCategories();
        renderConcerns();
        grid.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderConcerns() {
        const query = searchInput.value.toLowerCase();
        const filtered = DATA.filter(item => {
            const matchesCat = activeCat === "All" || item.cat === activeCat;
            const matchesName = item.name.toLowerCase().includes(query);
            return matchesCat && matchesName;
        });

        if (filtered.length === 0) {
            grid.innerHTML = `<div style="height:100%; display:flex; align-items:center; justify-content:center; color:var(--text-muted);">No results found.</div>`;
            return;
        }

        grid.innerHTML = filtered.map(item => {
            // Instagram carousel placeholder
            const carouselItems = Array(3).fill('<div class="carousel-item"></div>').join('');

            return `
            <div class="concern-card" onclick="openDetail('${item.name.replace(/'/g, "\\'")}')">
                <div class="card-header">
                    <h3>${item.name}</h3>
                </div>
                
                <div class="card-carousel" onclick="event.stopPropagation()">
                    ${carouselItems}
                </div>

                <div class="card-footer">
                    <span class="cat-tag" style="background: ${CAT_COLORS[item.cat] || '#222'}20; color: ${CAT_COLORS[item.cat] || '#888'}">
                        ${item.cat}
                    </span>
                    <div class="arrow-hint">
                        View Protocol <span style="font-size:18px">→</span>
                    </div>
                </div>
            </div>
            `;
        }).join('');
    }

    searchInput.addEventListener('input', renderConcerns);

    function openDetail(name) {
        const item = DATA.find(d => d.name === name);
        const overlay = document.getElementById('detail-overlay');
        const content = document.getElementById('detailContent');
        
        content.innerHTML = `
            <h1 class="detail-title">${item.name}</h1>
            <div class="protocol-panel">
                <div class="panel-header" onclick="togglePanel(this)">
                    <h4>Medical Treatments</h4>
                    <span class="panel-count">${item.med.length} items</span>
                </div>
                <div class="panel-body">
                    ${item.med.map(m => `<div class="protocol-item"><span class="item-name">${m.name}</span><p class="item-desc">${m.desc}</p></div>`).join('')}
                </div>
            </div>
            <div class="protocol-panel">
                <div class="panel-header" onclick="togglePanel(this)">
                    <h4>Skincare Ingredients</h4>
                    <span class="panel-count">${item.ing.length} items</span>
                </div>
                <div class="panel-body">
                    ${item.ing.map(i => `<div class="protocol-item"><span class="item-name">${i.name}</span><p class="item-desc">${i.desc}</p></div>`).join('')}
                </div>
            </div>
            <div class="protocol-panel">
                <div class="panel-header" onclick="togglePanel(this)">
                    <h4>Dietary Protocols</h4>
                    <span class="panel-count">${item.diet.length} items</span>
                </div>
                <div class="panel-body">
                    ${item.diet.map(d => `<div class="protocol-item"><span class="item-name">${d.name}</span><p class="item-desc">${d.desc}</p></div>`).join('')}
                </div>
            </div>
        `;
        
        overlay.style.display = 'block';
        setTimeout(() => overlay.classList.add('active'), 10);
    }

    function closeDetail() {
        const overlay = document.getElementById('detail-overlay');
        overlay.classList.remove('active');
        setTimeout(() => overlay.style.display = 'none', 300);
    }

    function togglePanel(header) {
        header.nextElementSibling.classList.toggle('open');
    }

    function toggleSettings() {
        document.getElementById('settings-sheet').classList.toggle('active');
        document.querySelector('.sheet-overlay').classList.toggle('active');
    }

    window.onload = init;
</script>

</body>
</html>
